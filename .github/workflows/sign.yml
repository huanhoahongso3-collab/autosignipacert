name: Sign IPA, Release, and Generate Install Link

on:
  workflow_dispatch:
    inputs:
      app_choice:
        type: choice
        description: 'Select the App to download and sign'
        required: true
        options:
          - YouTube
          - Spotify
          - ibisPaint X
          - Custom
        default: 'YouTube'
      custom_url:
        description: 'Custom IPA Download URL (Only used if "Custom" is selected)'
        required: false
        default: ''
      release_tag:
        description: 'Release Tag (Leave blank for current date & time)'
        required: false
        default: ''
      app_title:
        description: 'App Title (Displayed during install prompt)'
        required: true
        default: 'My iOS App'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sign-release-deploy:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Determine or generate the Release Tag
      - name: Handle Release Tag
        id: tags
        run: |
          INPUT_TAG="${{ github.event.inputs.release_tag }}"
          if [ -z "$INPUT_TAG" ]; then
            GENERATED_TAG=$(date +'%Y%m%d-%H%M%S')
            echo "TAG_NAME=$GENERATED_TAG" >> $GITHUB_ENV
            echo "Using dynamically generated tag: $GENERATED_TAG"
          else
            echo "TAG_NAME=$INPUT_TAG" >> $GITHUB_ENV
            echo "Using provided tag: $INPUT_TAG"
          fi

      # 2. Download the target IPA based on the user's dropdown choice
      - name: Download Target IPA
        run: |
          CHOICE="${{ github.event.inputs.app_choice }}"
          CUSTOM_URL="${{ github.event.inputs.custom_url }}"
          DOWNLOAD_URL=""

          if [ "$CHOICE" = "YouTube" ]; then
            DOWNLOAD_URL="https://github.com/huanhoahongso3-collab/autosignipacert/releases/download/ipa/DiuTube_21.08.3_16.0_LeTi.ipa"
          elif [ "$CHOICE" = "Spotify" ]; then
            DOWNLOAD_URL="https://github.com/huanhoahongso3-collab/autosignipacert/releases/download/ipa/EeveeSpotify-9.1.0.ipa"
          elif [ "$CHOICE" = "ibisPaint X" ]; then
            DOWNLOAD_URL="https://github.com/huanhoahongso3-collab/autosignipacert/releases/download/ipa/ibis.Paint.X++_14.0.0_15.0_LeTi.ipa"
          elif [ "$CHOICE" = "Custom" ]; then
            if [ -z "$CUSTOM_URL" ]; then
              echo "❌ Error: Custom choice selected but no Custom URL was provided."
              exit 1
            fi
            DOWNLOAD_URL="$CUSTOM_URL"
          fi

          echo "📥 Downloading IPA from: $DOWNLOAD_URL"
          curl -L "$DOWNLOAD_URL" -o target_app.ipa

      # 3. Setup signing inputs using the root files & Auto-Extract Bundle ID
      - name: Install Apple Certificate and Provisioning Profile
        id: provision_setup
        env:
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)
          
          P12_FILE="cert.p12"
          PROVISION_FILE="cert.mobileprovision"
          
          if [ ! -f "$P12_FILE" ] || [ ! -f "$PROVISION_FILE" ]; then
            echo "❌ Error: cert.p12 or cert.mobileprovision not found in the repository root."
            exit 1
          fi

          # Decrypt provisioning profile to XML text to parse it
          security cms -D -i "$PROVISION_FILE" > provision.plist
          
          # Extract Bundle ID
          FULL_APP_ID=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" provision.plist)
          BUNDLE_ID=${FULL_APP_ID#*.}
          
          echo "bundle_id=$BUNDLE_ID" >> $GITHUB_OUTPUT
          echo "✅ Auto-detected Bundle ID: $BUNDLE_ID"

          # Setup Keychain and Certificate
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $P12_FILE -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Copy provisioning profile to system library location
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" provision.plist)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROVISION_FILE" ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          
          rm provision.plist

      # 4. Resign the downloaded IPA manually using native macOS tools
      - name: Resign IPA
        id: resign_ipa
        run: |
          CLEAN_CHOICE=$(echo "${{ github.event.inputs.app_choice }}" | sed 's/ /_/g')
          OUTPUT_NAME="${CLEAN_CHOICE}-Signed.ipa"
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Explicitly add our custom keychain to the system search list
          security list-keychains -s $KEYCHAIN_PATH $(security list-keychains | tr -d '"')

          # Find the exact identity name inside our keychain
          CERT_NAME=$(security find-identity -v -p codesigning $KEYCHAIN_PATH | grep -o '"[^"]*"' | head -n 1 | tr -d '"')
          
          if [ -z "$CERT_NAME" ]; then
            echo "❌ Error: Could not find any valid code signing identities in the temporary keychain."
            exit 1
          fi
          echo "🎯 Found Signing Identity: $CERT_NAME"

          # Unzip the target app
          echo "📦 Unzipping IPA..."
          unzip -q target_app.ipa -d app_extracted
          
          # Locating the .app directory inside Payload
          APP_PATH=$(find app_extracted/Payload -maxdepth 1 -name "*.app")
          echo "📱 Targeting App Bundle: $APP_PATH"

          # Remove existing signatures
          rm -rf "$APP_PATH/_CodeSignature"

          # Replace the old profile with your new repo root profile
          cp cert.mobileprovision "$APP_PATH/embedded.mobileprovision"

          # Extract entitlements dynamically from the provision profile to apply during signing
          security cms -D -i cert.mobileprovision > provision.plist
          /usr/libexec/PlistBuddy -x -c "Print :Entitlements" provision.plist > entitlements.plist

          # Code sign the application binary structure
          echo "✍️ Signing app bundle components..."
          
          # Sign nested frameworks or dylibs if they exist
          if [ -d "$APP_PATH/Frameworks" ]; then
            for framework in "$APP_PATH/Frameworks/"*; do
              if [ -d "$framework" ] || [ -f "$framework" ]; then
                codesign --force --sign "$CERT_NAME" --keychain $KEYCHAIN_PATH "$framework"
              fi
            done
          fi

          # Sign the primary app bundle along with its entitlements
          codesign --force --sign "$CERT_NAME" --keychain $KEYCHAIN_PATH --entitlements entitlements.plist "$APP_PATH"

          # Re-package back into a valid IPA file structure
          echo "🔒 Re-packaging signed bundle..."
          cd app_extracted
          zip -qr ../"$OUTPUT_NAME" Payload
          cd ..

          # Cleanup workspace files
          rm -rf app_extracted provision.plist entitlements.plist
          
          echo "✅ Successfully generated: $OUTPUT_NAME"
          echo "output_ipa_name=$OUTPUT_NAME" >> $GITHUB_OUTPUT

      # 5. Create GitHub Release using determined tag
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.TAG_NAME }}
          files: ${{ steps.resign_ipa.outputs.output_ipa_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 6. Generate Manifest and Webpage using auto-detected values
      - name: Generate OTA Files
        run: |
          mkdir -p public
          
          IPA_URL="https://github.com/${{ github.repository }}/releases/download/${{ env.TAG_NAME }}/${{ steps.resign_ipa.outputs.output_ipa_name }}"
          BUNDLE_ID="${{ steps.provision_setup.outputs.bundle_id }}"
          
          # Generate manifest.plist
          cat <<EOF > public/manifest.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>items</key>
              <array>
                  <dict>
                      <key>assets</key>
                      <array>
                          <dict>
                              <key>kind</key>
                              <string>software-package</string>
                              <key>url</key>
                              <string>$IPA_URL</string>
                          </dict>
                      </array>
                      <key>metadata</key>
                      <dict>
                          <key>bundle-identifier</key>
                          <string>$BUNDLE_ID</string>
                          <key>bundle-version</key>
                          <string>1.0.0</string>
                          <key>kind</key>
                          <string>software</string>
                          <key>title</key>
                          <string>${{ github.event.inputs.app_title }}</string>
                      </dict>
                  </dict>
              </array>
          </dict>
          </plist>
          EOF

          PLIST_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/manifest.plist"
          ITMS_URL="itms-services://?action=download-manifest&url=$PLIST_URL"

          # Create landing page
          cat <<EOF > public/index.html
          <!DOCTYPE html>
          <html>
          <head>
              <title>Install ${{ github.event.inputs.app_title }}</title>
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <style>
                  body { font-family: -apple-system, sans-serif; text-align: center; padding: 50px 20px; background: #f5f5f7; }
                  .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; max-width: 400px; width: 100%; }
                  h1 { color: #1d1d1f; margin-bottom: 5px; }
                  p { color: #86868b; margin-bottom: 25px; }
                  .btn { background: #0071e3; color: white; padding: 12px 24px; border-radius: 980px; text-decoration: none; font-weight: bold; display: inline-block; margin-bottom: 20px; }
                  .qr { margin-top: 20px; }
              </style>
          </head>
          <body>
              <div class="card">
                  <h1>${{ github.event.inputs.app_title }}</h1>
                  <p>Version ${{ env.TAG_NAME }}<br><small style="color:#b2b2b6;">$BUNDLE_ID</small></p>
                  <a href="$ITMS_URL" class="btn">Tap to Install on iOS</a>
                  <div class="qr">
                      <p style="font-size: 12px; margin-bottom: 10px;">Or scan this QR code on your device:</p>
                      <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=$(echo -n $ITMS_URL | xorly -ut)" alt="QR Code" />
                  </div>
              </div>
          </body>
          </html>
          EOF

      # 7. Setup and Upload Pages Artifact
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

      # 8. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Sign IPA, Release, and Generate Install Link

on:
  workflow_dispatch:
    inputs:
      app_choice:
        type: choice
        description: 'Select the App to download and sign'
        required: true
        options:
          - YouTube
          - Spotify
          - ibisPaint X
          - Custom
        default: 'YouTube'
      custom_url:
        description: 'Custom IPA Download URL (Only used if "Custom" is selected)'
        required: false
        default: ''
      release_tag:
        description: 'Release Tag (Leave blank for current date & time)'
        required: false
        default: ''
      app_title:
        description: 'App Title (Leave blank to auto-detect from IPA)'
        required: false
        default: ''
      p12_password_input:
        description: 'Cert Password (Optional - leave blank to use repo secret)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  sign-release-deploy:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Handle Release Tag & Check for Duplicates
      - name: Handle and Verify Release Tag
        id: tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INPUT_TAG="${{ github.event.inputs.release_tag }}"
          
          if [ -z "$INPUT_TAG" ]; then
            FINAL_TAG=$(date +'%Y%m%d-%H%M%S')
            echo "TAG_NAME=$FINAL_TAG" >> $GITHUB_ENV
            echo "Using dynamically generated tag: $FINAL_TAG"
          else
            FINAL_TAG=$(echo "$INPUT_TAG" | sed 's/[^a-zA-Z0-9._-]/_/g')
            
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/$FINAL_TAG")
            
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "❌ ERROR: The release tag '$FINAL_TAG' already exists!"
              exit 1
            fi
            
            echo "TAG_NAME=$FINAL_TAG" >> $GITHUB_ENV
            echo "Validated release tag: $FINAL_TAG"
          fi

      # 2. Download the target IPA based on the user's dropdown choice
      - name: Download Target IPA
        run: |
          CHOICE="${{ github.event.inputs.app_choice }}"
          CUSTOM_URL="${{ github.event.inputs.custom_url }}"
          DOWNLOAD_URL=""

          if [ "$CHOICE" = "YouTube" ]; then
            DOWNLOAD_URL="https://github.com/huanhoahongso3-collab/autosignipacert/releases/download/ipa/DiuTube_21.08.3_16.0_LeTi.ipa"
          elif [ "$CHOICE" = "Spotify" ]; then
            DOWNLOAD_URL="https://github.com/huanhoahongso3-collab/autosignipacert/releases/download/ipa/EeveeSpotify-9.1.0.ipa"
          elif [ "$CHOICE" = "ibisPaint X" ]; then
            DOWNLOAD_URL="https://github.com/huanhoahongso3-collab/autosignipacert/releases/download/ipa/ibis.Paint.X++_14.0.0_15.0_LeTi.ipa"
          elif [ "$CHOICE" = "Custom" ]; then
            if [ -z "$CUSTOM_URL" ]; then
              echo "❌ Error: Custom choice selected but no Custom URL was provided."
              exit 1
            fi
            DOWNLOAD_URL="$CUSTOM_URL"
          fi

          echo "📥 Downloading IPA from: $DOWNLOAD_URL"
          curl -L "$DOWNLOAD_URL" -o target_app.ipa

      # 3. Determine password input or fallback secret, Parse Cert Name, & Setup Keychain
      - name: Install Apple Certificate & Extract Identity
        id: keychain_setup
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)
          
          if [ -n "${{ github.event.inputs.p12_password_input }}" ]; then
            P12_PASS="${{ github.event.inputs.p12_password_input }}"
            echo "🔑 Using certificate password provided in workflow inputs."
          else
            P12_PASS="${{ secrets.P12_PASSWORD }}"
            echo "🔐 Input blank. Falling back to repository secret (P12_PASSWORD)."
          fi
          
          P12_FILE="cert.p12"
          PROVISION_FILE="cert.mobileprovision"
          
          if [ ! -f "$P12_FILE" ] || [ ! -f "$PROVISION_FILE" ]; then
            echo "❌ Error: cert.p12 or cert.mobileprovision not found in the repository root."
            exit 1
          fi

          # Extracts the full identity descriptor out of the binary payload
          CERT_SUBJECT=$(openssl pkcs12 -in "$P12_FILE" -clcerts -nokeys -passin "pass:$P12_PASS" 2>/dev/null | openssl x509 -noout -subject 2>/dev/null)
          CERT_CN=$(echo "$CERT_SUBJECT" | grep -oE "CN\s*=\s*[^,]+" | sed 's/CN\s*=\s*//')
          
          if [ -z "$CERT_CN" ]; then
             CERT_CN="Unknown Developer / Enterprise Certificate"
          fi
          echo "cert_name=$CERT_CN" >> $GITHUB_OUTPUT
          echo "📋 Extracted Certificate Name: $CERT_CN"

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $P12_FILE -k $KEYCHAIN_PATH -P "$P12_PASS" -T /usr/bin/codesign /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security cms -D -i "$PROVISION_FILE" > provision.plist
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" provision.plist)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROVISION_FILE" ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          rm provision.plist

      # 4. Unzip, Extract App Info (Bundle ID, Title, Version, Icon), and Resign natively
      - name: Extract App Details and Resign IPA
        id: resign_ipa
        run: |
          CLEAN_CHOICE=$(echo "${{ github.event.inputs.app_choice }}" | sed 's/ /_/g')
          OUTPUT_NAME="${CLEAN_CHOICE}-Signed.ipa"
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          security list-keychains -s $KEYCHAIN_PATH $(security list-keychains | tr -d '"')
          CERT_NAME=$(security find-identity -v -p codesigning $KEYCHAIN_PATH | grep -o '"[^"]*"' | head -n 1 | tr -d '"')
          
          if [ -z "$CERT_NAME" ]; then
            echo "❌ Error: Could not find any valid code signing identities."
            exit 1
          fi

          echo "📦 Unzipping IPA..."
          unzip -q target_app.ipa -d app_extracted
          APP_PATH=$(find app_extracted/Payload -maxdepth 1 -name "*.app")
          INFOPLIST="$APP_PATH/Info.plist"

          # 1. Auto-extract Bundle ID
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$INFOPLIST")
          echo "bundle_id=$BUNDLE_ID" >> $GITHUB_OUTPUT
          echo "✅ Auto-detected App Bundle ID: $BUNDLE_ID"

          # 2. Auto-extract actual App Version from plist
          APP_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$INFOPLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$INFOPLIST" 2>/dev/null)
          if [ -z "$APP_VERSION" ]; then
            APP_VERSION="1.0.0"
          fi
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT
          echo "✅ Auto-detected App Version: $APP_VERSION"

          # 3. Auto-extract App Title fallback logic
          INPUT_TITLE="${{ github.event.inputs.app_title }}"
          if [ -z "$INPUT_TITLE" ]; then
            APP_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleDisplayName" "$INFOPLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Print :CFBundleName" "$INFOPLIST" 2>/dev/null)
            if [ -z "$APP_NAME" ]; then
              APP_NAME="${{ github.event.inputs.app_choice }}"
            fi
          else
            APP_NAME="$INPUT_TITLE"
          fi
          echo "final_app_title=$APP_NAME" >> $GITHUB_OUTPUT
          echo "🎯 App Title determined as: $APP_NAME"

          # 4. Safe Icon Extraction Logic
          mkdir -p extracted_assets
          HAS_ICON="false"
          
          if /usr/libexec/PlistBuddy -c "Print :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles:0" "$INFOPLIST" >/dev/null 2>&1; then
            PLIST_ICON=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles:0" "$INFOPLIST")
            if [ -n "$PLIST_ICON" ]; then
              ICON_FILE=$(find "$APP_PATH" -name "${PLIST_ICON}*" -name "*.png" | head -n 1)
              if [ -n "$ICON_FILE" ] && [ -f "$ICON_FILE" ]; then
                 cp "$ICON_FILE" extracted_assets/icon.png
                 HAS_ICON="true"
                 echo "🖼️ Successfully found icon path from Plist entry: $ICON_FILE"
              fi
            fi
          fi

          if [ "$HAS_ICON" = "false" ]; then
            echo "⚠️ Plist icon lookup empty or skipped. Scanning file tree for assets..."
            ICON_FILE=$(find "$APP_PATH" -name "*AppIcon*" -name "*.png" | sort -r | head -n 1)
            if [ -z "$ICON_FILE" ]; then
              ICON_FILE=$(find "$APP_PATH" -maxdepth 1 -name "*.png" | grep -E -i "icon|logo" | head -n 1)
            fi
            if [ -n "$ICON_FILE" ] && [ -f "$ICON_FILE" ]; then
              cp "$ICON_FILE" extracted_assets/icon.png
              HAS_ICON="true"
              echo "🖼️ Found App Icon via fallback scan: $ICON_FILE"
            fi
          fi
          echo "has_icon=$HAS_ICON" >> $GITHUB_OUTPUT

          # Codesigning steps
          rm -rf "$APP_PATH/_CodeSignature"
          cp cert.mobileprovision "$APP_PATH/embedded.mobileprovision"

          security cms -D -i cert.mobileprovision > provision.plist
          /usr/libexec/PlistBuddy -x -c "Print :Entitlements" provision.plist > entitlements.plist

          if [ -d "$APP_PATH/Frameworks" ]; then
            for framework in "$APP_PATH/Frameworks/"*; do
              if [ -d "$framework" ] || [ -f "$framework" ]; then
                codesign --force --sign "$CERT_NAME" --keychain $KEYCHAIN_PATH "$framework"
              fi
            done
          fi

          codesign --force --sign "$CERT_NAME" --keychain $KEYCHAIN_PATH --entitlements entitlements.plist "$APP_PATH"

          cd app_extracted
          zip -qr ../"$OUTPUT_NAME" Payload
          cd ..

          rm -rf app_extracted provision.plist entitlements.plist
          echo "output_ipa_name=$OUTPUT_NAME" >> $GITHUB_OUTPUT

      # 5. Create GitHub Release with metadata notes
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.TAG_NAME }}
          body: |
            ## 📱 OTA Direct Installation
            🔗 **[Click here to install ${{ steps.resign_ipa.outputs.final_app_title }} directly on iOS](https://huanhoahongso3-collab.github.io/autosignipacert/${{ env.TAG_NAME }}/)**
            
            ---
            
            ### 📋 Build Metadata Info
            * **App Name:** `${{ steps.resign_ipa.outputs.final_app_title }}`
            * **Version:** `${{ steps.resign_ipa.outputs.app_version }}`
            * **Tag:** `${{ env.TAG_NAME }}`
            * **Bundle ID:** `${{ steps.resign_ipa.outputs.bundle_id }}`
            * **📄 Certificate Name:** `CN = ${{ steps.keychain_setup.outputs.cert_name }}`
          files: ${{ steps.resign_ipa.outputs.output_ipa_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 6. Generate Dedicated Pages Subfolder Structure
      - name: Generate Subfolder Web Files
        run: |
          DEPLOY_DIR="deploy_dir/${{ env.TAG_NAME }}"
          mkdir -p "$DEPLOY_DIR"
          
          APP_TITLE="${{ steps.resign_ipa.outputs.final_app_title }}"
          BUNDLE_ID="${{ steps.resign_ipa.outputs.bundle_id }}"
          APP_VERSION="${{ steps.resign_ipa.outputs.app_version }}"
          HAS_ICON="${{ steps.resign_ipa.outputs.has_icon }}"
          CERT_NAME="${{ steps.keychain_setup.outputs.cert_name }}"
          
          if [ "$HAS_ICON" = "true" ]; then
            mv extracted_assets/icon.png "$DEPLOY_DIR/icon.png"
            HTML_ICON_ELEMENT="<img src=\"icon.png\" class=\"app-icon\" alt=\"App Icon\" />"
          else
            FIRST_LETTER=$(echo "$APP_TITLE" | cut -c 1 | tr '[:lower:]' '[:upper:]')
            HTML_ICON_ELEMENT="<div class=\"app-icon-fallback\">$FIRST_LETTER</div>"
          fi
          
          IPA_URL="https://github.com/${{ github.repository }}/releases/download/${{ env.TAG_NAME }}/${{ steps.resign_ipa.outputs.output_ipa_name }}"
          
          # Generate manifest.plist
          cat <<EOF > "$DEPLOY_DIR/manifest.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>items</key>
              <array>
                  <dict>
                      <key>assets</key>
                      <array>
                          <dict>
                              <key>kind</key>
                              <string>software-package</string>
                              <key>url</key>
                              <string>$IPA_URL</string>
                          </dict>
                      </array>
                      <key>metadata</key>
                      <dict>
                          <key>bundle-identifier</key>
                          <string>$BUNDLE_ID</string>
                          <key>bundle-version</key>
                          <string>$APP_VERSION</string>
                          <key>kind</key>
                          <string>software</string>
                          <key>title</key>
                          <string>$APP_TITLE</string>
                      </dict>
                  </dict>
              </array>
          </dict>
          </plist>
          EOF

          PLIST_URL="https://huanhoahongso3-collab.github.io/autosignipacert/${{ env.TAG_NAME }}/manifest.plist"
          ITMS_URL="itms-services://?action=download-manifest&url=$PLIST_URL"
          
          # HTML page compilation with dynamic theme engine, Space Grotesk Font, and M3 design tokens
          cat <<EOF > "$DEPLOY_DIR/index.html"
          <!DOCTYPE html>
          <html>
          <head>
              <title>Install $APP_TITLE</title>
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <link rel="preconnect" href="https://fonts.googleapis.com">
              <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
              <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
              <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
              <style>
                  /* Material 3 Dynamic Baseline Palette Mapping Rules */
                  :root {
                      --md-sys-color-background: #fef7ff;
                      --md-sys-color-on-background: #1d1b20;
                      --md-sys-color-surface: #f7f2fa;
                      --md-sys-color-surface-variant: #e7e0ec;
                      --md-sys-color-on-surface: #1d1b20;
                      --md-sys-color-on-surface-variant: #49454f;
                      --md-sys-color-primary: #6750a4;
                      --md-sys-color-on-primary: #ffffff;
                      --md-sys-color-outline: #79747e;
                      --md-sys-color-outline-variant: #c4c7c5;
                      --md-sys-elevation-3: 0px 4px 8px 3px rgba(0, 0, 0, 0.15), 0px 1px 3px rgba(0, 0, 0, 0.3);
                      --qr-matrix-bg: #fef7ff;
                  }
                  @media (prefers-color-scheme: dark) {
                      :root {
                          --md-sys-color-background: #141218;
                          --md-sys-color-on-background: #e6e1e5;
                          --md-sys-color-surface: #211f26;
                          --md-sys-color-surface-variant: #49454f;
                          --md-sys-color-on-surface: #e6e1e5;
                          --md-sys-color-on-surface-variant: #cac4d0;
                          --md-sys-color-primary: #d0bcff;
                          --md-sys-color-on-primary: #381e72;
                          --md-sys-color-outline: #938f99;
                          --md-sys-color-outline-variant: #444746;
                          --md-sys-elevation-3: 0px 4px 8px 3px rgba(0, 0, 0, 0.3), 0px 1px 3px rgba(0, 0, 0, 0.4);
                          --qr-matrix-bg: #ffffff; /* Must remain crisp white for visual balance and camera hardware scanning decoding */
                      }
                  }
                  
                  body { 
                      font-family: 'Space Grotesk', sans-serif; 
                      text-align: center; 
                      padding: 40px 16px; 
                      background-color: var(--md-sys-color-background); 
                      color: var(--md-sys-color-on-background); 
                      margin: 0;
                      transition: background-color 0.25s cubic-bezier(0.2, 0, 0, 1);
                  }
                  
                  /* Material 3 Card Component specs */
                  .m3-card { 
                      background-color: var(--md-sys-color-surface); 
                      padding: 32px 24px; 
                      border-radius: 28px; /* M3 Medium Component border radius standard */
                      box-shadow: var(--md-sys-elevation-3);
                      display: inline-block; 
                      max-width: 400px; 
                      width: 100%; 
                      box-sizing: border-box; 
                      border: 1px solid var(--md-sys-color-outline-variant);
                      transition: background-color 0.25s cubic-bezier(0.2, 0, 0, 1);
                  }
                  
                  .app-icon { 
                      width: 96px; 
                      height: 96px; 
                      border-radius: 24px; /* Squircle aspect mapping */
                      object-fit: cover; 
                      margin-bottom: 20px;
                      box-shadow: 0px 2px 4px rgba(0,0,0,0.1);
                  }
                  
                  .app-icon-fallback { 
                      width: 96px; 
                      height: 96px; 
                      border-radius: 24px; 
                      background: linear-gradient(135deg, var(--md-sys-color-primary), var(--md-sys-color-outline)); 
                      color: var(--md-sys-color-on-primary); 
                      display: flex; 
                      align-items: center; 
                      justify-content: center; 
                      font-size: 40px; 
                      font-weight: 700; 
                      margin: 0 auto 20px auto; 
                  }
                  
                  h1 { 
                      font-size: 28px; 
                      font-weight: 700;
                      margin: 0 0 8px 0; 
                      letter-spacing: -0.5px;
                      color: var(--md-sys-color-on-surface);
                  }
                  
                  .meta-container {
                      background-color: var(--md-sys-color-surface-variant);
                      border-radius: 16px;
                      padding: 12px 16px;
                      margin-bottom: 28px;
                      text-align: left;
                  }
                  
                  .meta-row {
                      font-size: 13px;
                      line-height: 1.6;
                      color: var(--md-sys-color-on-surface-variant);
                      word-break: break-all;
                  }
                  .meta-label {
                      font-weight: 700;
                      color: var(--md-sys-color-on-surface);
                  }
                  
                  /* Material 3 Filled Button specification mapping tokens */
                  .m3-btn { 
                      background-color: var(--md-sys-color-primary); 
                      color: var(--md-sys-color-on-primary); 
                      padding: 14px 28px; 
                      border-radius: 100px; /* Fully rounded capsule */
                      text-decoration: none; 
                      font-weight: 500; 
                      font-size: 16px;
                      display: inline-flex;
                      align-items: center;
                      justify-content: center;
                      gap: 8px;
                      margin-bottom: 28px; 
                      transition: box-shadow 0.2s ease, transform 0.1s ease;
                      letter-spacing: 0.1px;
                  }
                  .m3-btn:hover { 
                      box-shadow: 0px 1px 3px 1px rgba(0,0,0,0.15), 0px 1px 2px rgba(0,0,0,0.3);
                      opacity: 0.92;
                  }
                  .m3-btn:active {
                      transform: scale(0.98);
                  }
                  
                  .qr-header-text {
                      font-size: 14px;
                      font-weight: 500;
                      margin-bottom: 12px;
                      color: var(--md-sys-color-on-surface);
                  }
                  
                  .qr-container { 
                      display: inline-block; 
                      background-color: var(--qr-matrix-bg); 
                      padding: 16px; 
                      border-radius: 16px; 
                      border: 1px solid var(--md-sys-color-outline-variant);
                      margin-bottom: 24px;
                  }
                  #qrcode img { margin: 0 auto; }
                  
                  .cert-footer { 
                      font-size: 11px; 
                      color: var(--md-sys-color-on-surface-variant); 
                      font-weight: 500; 
                      border-top: 1px solid var(--md-sys-color-outline-variant); 
                      padding-top: 16px; 
                      word-break: break-word; 
                      text-align: left;
                      line-height: 1.5;
                  }
              </style>
          </head>
          <body>
              <div class="m3-card">
                  $HTML_ICON_ELEMENT
                  <h1>$APP_TITLE</h1>
                  
                  <div class="meta-container">
                      <div class="meta-row"><span class="meta-label">Version:</span> $APP_VERSION</div>
                      <div class="meta-row"><span class="meta-label">Tag:</span> ${{ env.TAG_NAME }}</div>
                      <div class="meta-row"><span class="meta-label">Bundle ID:</span> $BUNDLE_ID</div>
                  </div>
                  
                  <a href="$ITMS_URL" class="m3-btn">
                      <span>Tap to Install App</span>
                  </a>
                  
                  <div>
                      <div class="qr-header-text">Or scan this QR code on iOS:</div>
                      <div class="qr-container">
                          <div id="qrcode"></div>
                      </div>
                      <div class="cert-footer">
                          🔒 <span style="font-weight:700;">Certificate Name:</span><br>
                          <span style="font-family: monospace; font-size:11px; display:block; margin-top:4px;">CN = $CERT_NAME</span>
                      </div>
                  </div>
              </div>
              <script>
                  new QRCode(document.getElementById("qrcode"), {
                      text: "$ITMS_URL",
                      width: 160,
                      height: 160,
                      correctLevel : QRCode.CorrectLevel.L
                  });
              </script>
          </body>
          </html>
          EOF

      # 7. Push to gh-pages branch without erasing prior folders
      - name: Deploy to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: deploy_dir
          branch: gh-pages
          clean: false

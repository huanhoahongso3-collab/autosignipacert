name: Sign IPA, Release, and Generate Install Link

on:
  workflow_dispatch:
    inputs:
      app_choice:
        type: choice
        description: 'Select the App to download and sign'
        required: true
        options:
          - YouTube
          - Spotify
          - ibisPaint X
          - Custom
        default: 'YouTube'
      custom_url:
        description: 'Custom IPA Download URL (Only used if "Custom" is selected)'
        required: false
        default: ''
      release_tag:
        description: 'Release Tag (Leave blank for current date & time)'
        required: false
        default: ''
      app_title:
        description: 'App Title (Leave blank to auto-detect from IPA)'
        required: false
        default: ''
      p12_password_input:
        description: 'Cert Password (Optional - leave blank to use repo secret)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  sign-release-deploy:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Handle Release Tag & Check for Duplicates
      - name: Handle and Verify Release Tag
        id: tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INPUT_TAG="${{ github.event.inputs.release_tag }}"
          
          if [ -z "$INPUT_TAG" ]; then
            FINAL_TAG=$(date +'%Y%m%d-%H%M%S')
            echo "TAG_NAME=$FINAL_TAG" >> $GITHUB_ENV
            echo "Using dynamically generated tag: $FINAL_TAG"
          else
            FINAL_TAG=$(echo "$INPUT_TAG" | sed 's/[^a-zA-Z0-9._-]/_/g')
            
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/$FINAL_TAG")
            
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "❌ ERROR: The release tag '$FINAL_TAG' already exists!"
              exit 1
            fi
            
            echo "TAG_NAME=$FINAL_TAG" >> $GITHUB_ENV
            echo "Validated release tag: $FINAL_TAG"
          fi

      # 2. Download the target IPA based on the user's dropdown choice
      - name: Download Target IPA
        run: |
          CHOICE="${{ github.event.inputs.app_choice }}"
          CUSTOM_URL="${{ github.event.inputs.custom_url }}"
          DOWNLOAD_URL=""

          if [ "$CHOICE" = "YouTube" ]; then
            DOWNLOAD_URL="https://github.com/huanhoahongso3-collab/autosignipacert/releases/download/ipa/DiuTube_21.08.3_16.0_LeTi.ipa"
          elif [ "$CHOICE" = "Spotify" ]; then
            DOWNLOAD_URL="https://github.com/huanhoahongso3-collab/autosignipacert/releases/download/ipa/EeveeSpotify-9.1.0.ipa"
          elif [ "$CHOICE" = "ibisPaint X" ]; then
            DOWNLOAD_URL="https://github.com/huanhoahongso3-collab/autosignipacert/releases/download/ipa/ibis.Paint.X++_14.0.0_15.0_LeTi.ipa"
          elif [ "$CHOICE" = "Custom" ]; then
            if [ -z "$CUSTOM_URL" ]; then
              echo "❌ Error: Custom choice selected but no Custom URL was provided."
              exit 1
            fi
            DOWNLOAD_URL="$CUSTOM_URL"
          fi

          echo "📥 Downloading IPA from: $DOWNLOAD_URL"
          curl -L "$DOWNLOAD_URL" -o target_app.ipa

      # 3. Determine password input or fallback secret & Setup Keychain
      - name: Install Apple Certificate
        id: keychain_setup
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)
          
          if [ -n "${{ github.event.inputs.p12_password_input }}" ]; then
            P12_PASS="${{ github.event.inputs.p12_password_input }}"
            echo "🔑 Using certificate password provided in workflow inputs."
          else
            P12_PASS="${{ secrets.P12_PASSWORD }}"
            echo "🔐 Input blank. Falling back to repository secret (P12_PASSWORD)."
          fi
          
          P12_FILE="cert.p12"
          PROVISION_FILE="cert.mobileprovision"
          
          if [ ! -f "$P12_FILE" ] || [ ! -f "$PROVISION_FILE" ]; then
            echo "❌ Error: cert.p12 or cert.mobileprovision not found in the repository root."
            exit 1
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $P12_FILE -k $KEYCHAIN_PATH -P "$P12_PASS" -T /usr/bin/codesign /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security cms -D -i "$PROVISION_FILE" > provision.plist
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" provision.plist)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROVISION_FILE" ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          rm provision.plist

      # 4. Unzip, Extract App Info (Bundle ID, Title, Icon), and Resign natively
      - name: Extract App Details and Resign IPA
        id: resign_ipa
        run: |
          CLEAN_CHOICE=$(echo "${{ github.event.inputs.app_choice }}" | sed 's/ /_/g')
          OUTPUT_NAME="${CLEAN_CHOICE}-Signed.ipa"
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          security list-keychains -s $KEYCHAIN_PATH $(security list-keychains | tr -d '"')
          CERT_NAME=$(security find-identity -v -p codesigning $KEYCHAIN_PATH | grep -o '"[^"]*"' | head -n 1 | tr -d '"')
          
          if [ -z "$CERT_NAME" ]; then
            echo "❌ Error: Could not find any valid code signing identities."
            exit 1
          fi

          echo "📦 Unzipping IPA..."
          unzip -q target_app.ipa -d app_extracted
          APP_PATH=$(find app_extracted/Payload -maxdepth 1 -name "*.app")
          INFOPLIST="$APP_PATH/Info.plist"

          # 1. Auto-extract Bundle ID
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$INFOPLIST")
          echo "bundle_id=$BUNDLE_ID" >> $GITHUB_OUTPUT
          echo "✅ Auto-detected App Bundle ID: $BUNDLE_ID"

          # 2. Auto-extract App Title fallback logic
          INPUT_TITLE="${{ github.event.inputs.app_title }}"
          if [ -z "$INPUT_TITLE" ]; then
            APP_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleDisplayName" "$INFOPLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Print :CFBundleName" "$INFOPLIST" 2>/dev/null)
            if [ -z "$APP_NAME" ]; then
              APP_NAME="${{ github.event.inputs.app_choice }}"
            fi
          else
            APP_NAME="$INPUT_TITLE"
          fi
          echo "final_app_title=$APP_NAME" >> $GITHUB_OUTPUT
          echo "🎯 App Title determined as: $APP_NAME"

          # 3. Safe Icon Extraction Logic (Prevents crashing on missing keys)
          mkdir -p extracted_assets
          HAS_ICON="false"
          
          if /usr/libexec/PlistBuddy -c "Print :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles:0" "$INFOPLIST" >/dev/null 2>&1; then
            PLIST_ICON=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles:0" "$INFOPLIST")
            if [ -n "$PLIST_ICON" ]; then
              ICON_FILE=$(find "$APP_PATH" -name "${PLIST_ICON}*" -name "*.png" | head -n 1)
              if [ -n "$ICON_FILE" ] && [ -f "$ICON_FILE" ]; then
                 cp "$ICON_FILE" extracted_assets/icon.png
                 HAS_ICON="true"
                 echo "🖼️ Successfully found icon path from Plist entry: $ICON_FILE"
              fi
            fi
          fi

          if [ "$HAS_ICON" = "false" ]; then
            echo "⚠️ Plist icon lookup empty or skipped. Scanning file tree for assets..."
            ICON_FILE=$(find "$APP_PATH" -name "*AppIcon*" -name "*.png" | sort -r | head -n 1)
            if [ -z "$ICON_FILE" ]; then
              ICON_FILE=$(find "$APP_PATH" -maxdepth 1 -name "*.png" | grep -E -i "icon|logo" | head -n 1)
            fi
            if [ -n "$ICON_FILE" ] && [ -f "$ICON_FILE" ]; then
              cp "$ICON_FILE" extracted_assets/icon.png
              HAS_ICON="true"
              echo "🖼️ Found App Icon via fallback scan: $ICON_FILE"
            fi
          fi
          echo "has_icon=$HAS_ICON" >> $GITHUB_OUTPUT

          # Codesigning steps
          rm -rf "$APP_PATH/_CodeSignature"
          cp cert.mobileprovision "$APP_PATH/embedded.mobileprovision"

          security cms -D -i cert.mobileprovision > provision.plist
          /usr/libexec/PlistBuddy -x -c "Print :Entitlements" provision.plist > entitlements.plist

          if [ -d "$APP_PATH/Frameworks" ]; then
            for framework in "$APP_PATH/Frameworks/"*; do
              if [ -d "$framework" ] || [ -f "$framework" ]; then
                codesign --force --sign "$CERT_NAME" --keychain $KEYCHAIN_PATH "$framework"
              fi
            done
          fi

          codesign --force --sign "$CERT_NAME" --keychain $KEYCHAIN_PATH --entitlements entitlements.plist "$APP_PATH"

          cd app_extracted
          zip -qr ../"$OUTPUT_NAME" Payload
          cd ..

          rm -rf app_extracted provision.plist entitlements.plist
          echo "output_ipa_name=$OUTPUT_NAME" >> $GITHUB_OUTPUT

      # 5. Create GitHub Release
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.TAG_NAME }}
          body: |
            ## 📱 Installation Link
            🔗 **[Click here to install ${{ steps.resign_ipa.outputs.final_app_title }} directly on iOS](https://huanhoahongso3-collab.github.io/autosignipacert/${{ env.TAG_NAME }}/)**
          files: ${{ steps.resign_ipa.outputs.output_ipa_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 6. Generate Dedicated Pages Subfolder Structure
      - name: Generate Subfolder Web Files
        run: |
          DEPLOY_DIR="deploy_dir/${{ env.TAG_NAME }}"
          mkdir -p "$DEPLOY_DIR"
          
          APP_TITLE="${{ steps.resign_ipa.outputs.final_app_title }}"
          BUNDLE_ID="${{ steps.resign_ipa.outputs.bundle_id }}"
          HAS_ICON="${{ steps.resign_ipa.outputs.has_icon }}"
          
          if [ "$HAS_ICON" = "true" ]; then
            mv extracted_assets/icon.png "$DEPLOY_DIR/icon.png"
            HTML_ICON_ELEMENT="<img src=\"icon.png\" class=\"app-icon\" alt=\"App Icon\" />"
          else
            FIRST_LETTER=$(echo "$APP_TITLE" | cut -c 1 | tr '[:lower:]' '[:upper:]')
            HTML_ICON_ELEMENT="<div class=\"app-icon-fallback\">$FIRST_LETTER</div>"
          fi
          
          IPA_URL="https://github.com/${{ github.repository }}/releases/download/${{ env.TAG_NAME }}/${{ steps.resign_ipa.outputs.output_ipa_name }}"
          
          # Generate manifest.plist
          cat <<EOF > "$DEPLOY_DIR/manifest.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>items</key>
              <array>
                  <dict>
                      <key>assets</key>
                      <array>
                          <dict>
                              <key>kind</key>
                              <string>software-package</string>
                              <key>url</key>
                              <string>$IPA_URL</string>
                          </dict>
                      </array>
                      <key>metadata</key>
                      <dict>
                          <key>bundle-identifier</key>
                          <string>$BUNDLE_ID</string>
                          <key>bundle-version</key>
                          <string>1.0.0</string>
                          <key>kind</key>
                          <string>software</string>
                          <key>title</key>
                          <string>$APP_TITLE</string>
                      </dict>
                  </dict>
              </array>
          </dict>
          </plist>
          EOF

          PLIST_URL="https://huanhoahongso3-collab.github.io/autosignipacert/${{ env.TAG_NAME }}/manifest.plist"
          ITMS_URL="itms-services://?action=download-manifest&url=$PLIST_URL"
          
          # HTML page compilation
          cat <<EOF > "$DEPLOY_DIR/index.html"
          <!DOCTYPE html>
          <html>
          <head>
              <title>Install $APP_TITLE</title>
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
              <style>
                  body { font-family: -apple-system, sans-serif; text-align: center; padding: 50px 20px; background: #f5f5f7; }
                  .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; max-width: 400px; width: 100%; box-sizing: border-box; }
                  .app-icon { width: 100px; height: 100px; border-radius: 22px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); object-fit: cover; margin-bottom: 15px; }
                  .app-icon-fallback { width: 100px; height: 100px; border-radius: 22px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); background: linear-gradient(135deg, #0071e3, #1d1d1f); color: white; display: flex; align-items: center; justify-content: center; font-size: 44px; font-weight: bold; margin: 0 auto 15px auto; font-family: -apple-system, sans-serif; }
                  h1 { color: #1d1d1f; margin: 5px 0; font-size: 24px; }
                  p { color: #86868b; margin-top: 5px; margin-bottom: 25px; font-size: 14px; }
                  .btn { background: #0071e3; color: white; padding: 12px 24px; border-radius: 980px; text-decoration: none; font-weight: bold; display: inline-block; margin-bottom: 25px; font-size: 16px; }
                  .btn:hover { background: #0077ed; }
                  .qr-container { margin-top: 15px; display: inline-block; background: #f5f5f7; padding: 15px; border-radius: 12px; }
                  #qrcode img { margin: 0 auto; }
              </style>
          </head>
          <body>
              <div class="card">
                  $HTML_ICON_ELEMENT
                  <h1>$APP_TITLE</h1>
                  <p>Version ${{ env.TAG_NAME }}<br><small style="color:#b2b2b6;">$BUNDLE_ID</small></p>
                  <a href="$ITMS_URL" class="btn">Tap to Install App</a>
                  <div>
                      <p style="font-size: 13px; margin-bottom: 10px; color:#1d1d1f;">Or scan this QR code on iOS:</p>
                      <div class="qr-container">
                          <div id="qrcode"></div>
                      </div>
                  </div>
              </div>
              <script>
                  new QRCode(document.getElementById("qrcode"), {
                      text: "$ITMS_URL",
                      width: 160,
                      height: 160,
                      correctLevel : QRCode.CorrectLevel.L
                  });
              </script>
          </body>
          </html>
          EOF

      # 7. Push to gh-pages branch without erasing prior folders
      - name: Deploy to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: deploy_dir
          branch: gh-pages
          clean: false

name: Sign IPA, Release, and Generate Install Link

on:
  workflow_dispatch:
    inputs:
      app_choice:
        type: choice
        description: 'Select the App to download and sign'
        required: true
        options:
          - YouTube
          - Spotify
          - ibisPaint X
          - Custom
        default: 'YouTube'
      custom_url:
        description: 'Custom IPA Download URL (Only used if "Custom" is selected)'
        required: false
        default: ''
      release_tag:
        description: 'Release Tag (Leave blank for current date & time)'
        required: false
        default: ''
      app_title:
        description: 'App Title (Leave blank to auto-detect from IPA)'
        required: false
        default: ''
      p12_password_input:
        description: 'Cert Password (Optional - leave blank to use repo secret)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  sign-release-deploy:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Handle Release Tag & Check for Duplicates
      - name: Handle and Verify Release Tag
        id: tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INPUT_TAG="${{ github.event.inputs.release_tag }}"
          
          if [ -z "$INPUT_TAG" ]; then
            FINAL_TAG=$(date +'%Y%m%d-%H%M%S')
            echo "TAG_NAME=$FINAL_TAG" >> $GITHUB_ENV
            echo "Using dynamically generated tag: $FINAL_TAG"
          else
            FINAL_TAG=$(echo "$INPUT_TAG" | sed 's/[^a-zA-Z0-9._-]/_/g')
            
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/$FINAL_TAG")
            
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "❌ ERROR: The release tag '$FINAL_TAG' already exists!"
              exit 1
            fi
            
            echo "TAG_NAME=$FINAL_TAG" >> $GITHUB_ENV
            echo "Validated release tag: $FINAL_TAG"
          fi

      # 2. Download the target IPA based on the user's dropdown choice
      - name: Download Target IPA
        run: |
          CHOICE="${{ github.event.inputs.app_choice }}"
          CUSTOM_URL="${{ github.event.inputs.custom_url }}"
          DOWNLOAD_URL=""

          if [ "$CHOICE" = "YouTube" ]; then
            DOWNLOAD_URL="https://github.com/huanhoahongso3-collab/autosignipacert/releases/download/ipa/DiuTube_21.08.3_16.0_LeTi.ipa"
          elif [ "$CHOICE" = "Spotify" ]; then
            DOWNLOAD_URL="https://github.com/huanhoahongso3-collab/autosignipacert/releases/download/ipa/EeveeSpotify-9.1.0.ipa"
          elif [ "$CHOICE" = "ibisPaint X" ]; then
            DOWNLOAD_URL="https://github.com/huanhoahongso3-collab/autosignipacert/releases/download/ipa/ibis.Paint.X++_14.0.0_15.0_LeTi.ipa"
          elif [ "$CHOICE" = "Custom" ]; then
            if [ -z "$CUSTOM_URL" ]; then
              echo "❌ Error: Custom choice selected but no Custom URL was provided."
              exit 1
            fi
            DOWNLOAD_URL="$CUSTOM_URL"
          fi

          echo "📥 Downloading IPA from: $DOWNLOAD_URL"
          curl -L "$DOWNLOAD_URL" -o target_app.ipa

      # 3. Determine password, Parse Cert Name, & Setup Keychain
      #    FIX: Split -T flags (previously merged into one argument causing import failure).
      #         Use -A (allow all apps) which is safe for ephemeral CI keychains.
      #         Reorder keychain search list BEFORE set-key-partition-list or it silently fails.
      #         Add -f pkcs12 to avoid format-sniffing failures on certain P12 structures.
      - name: Install Apple Certificate & Extract Identity
        id: keychain_setup
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)
          
          if [ -n "${{ github.event.inputs.p12_password_input }}" ]; then
            P12_PASS="${{ github.event.inputs.p12_password_input }}"
            echo "🔑 Using certificate password provided in workflow inputs."
          else
            P12_PASS="${{ secrets.P12_PASSWORD }}"
            echo "🔐 Input blank. Falling back to repository secret (P12_PASSWORD)."
          fi
          
          P12_FILE="cert.p12"
          PROVISION_FILE="cert.mobileprovision"
          
          if [ ! -f "$P12_FILE" ] || [ ! -f "$PROVISION_FILE" ]; then
            echo "❌ Error: cert.p12 or cert.mobileprovision not found in the repository root."
            exit 1
          fi

          # Extract cert CN from the P12
          CERT_SUBJECT=$(openssl pkcs12 -in "$P12_FILE" -clcerts -nokeys -passin "pass:$P12_PASS" 2>/dev/null | openssl x509 -noout -subject 2>/dev/null)
          CERT_CN=$(echo "$CERT_SUBJECT" | grep -oE "CN\s*=\s*[^,/]+" | sed -E 's/^CN\s*=\s*//g' | tr -d '"' | xargs)
          
          if [ -z "$CERT_CN" ]; then
            CERT_CN="Unknown Developer / Enterprise Certificate"
          fi
          echo "cert_name=$CERT_CN" >> $GITHUB_OUTPUT
          echo "📋 Extracted Certificate Name: $CERT_CN"

          # Create and unlock keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # FIX: Use -A (all apps) and explicit -f pkcs12 instead of multiple -T flags
          #      which were being parsed as a single malformed argument.
          security import "$P12_FILE" \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASS" \
            -f pkcs12 \
            -A

          # FIX: Set our keychain first in the user search list BEFORE calling
          #      set-key-partition-list, otherwise the call silently has no effect.
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"' | xargs)

          # FIX: Add codesign: to the partition list alongside apple-tool: and apple:
          security set-key-partition-list \
            -S "apple-tool:,apple:,codesign:" \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          # Install provisioning profile
          security cms -D -i "$PROVISION_FILE" > provision.plist
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" provision.plist)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROVISION_FILE" ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          rm provision.plist

      # 4. Unzip, Extract App Info (Bundle ID, Title, Version, Icon), and Resign natively
      #    FIX: Icon extraction now decodes Apple-crushed (CgBI) PNGs via inline Python.
      #         Apple's PNG optimizer replaces standard zlib with raw deflate and swaps
      #         channels to BGRA. The decoder strips CgBI, re-inflates with wbits=-15
      #         (raw deflate), swaps BGRA->RGBA per-row, and recompresses as standard PNG.
      #         No extra dependencies required on macos-latest.
      - name: Extract App Details and Resign IPA
        id: resign_ipa
        run: |
          CLEAN_CHOICE=$(echo "${{ github.event.inputs.app_choice }}" | sed 's/ /_/g')
          OUTPUT_NAME="${CLEAN_CHOICE}-Signed.ipa"
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          security list-keychains -s "$KEYCHAIN_PATH" $(security list-keychains | tr -d '"' | xargs)
          CERT_NAME=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -o '"[^"]*"' | head -n 1 | tr -d '"')
          
          if [ -z "$CERT_NAME" ]; then
            echo "❌ Error: Could not find any valid code signing identities."
            exit 1
          fi

          echo "📦 Unzipping IPA..."
          unzip -q target_app.ipa -d app_extracted
          APP_PATH=$(find app_extracted/Payload -maxdepth 1 -name "*.app")
          INFOPLIST="$APP_PATH/Info.plist"

          # Auto-extract Bundle ID
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$INFOPLIST")
          echo "bundle_id=$BUNDLE_ID" >> $GITHUB_OUTPUT
          echo "✅ Auto-detected App Bundle ID: $BUNDLE_ID"

          # Auto-extract App Version
          APP_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$INFOPLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$INFOPLIST" 2>/dev/null)
          if [ -z "$APP_VERSION" ]; then
            APP_VERSION="1.0.0"
          fi
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT
          echo "✅ Auto-detected App Version: $APP_VERSION"

          # App Title fallback logic
          INPUT_TITLE="${{ github.event.inputs.app_title }}"
          if [ -z "$INPUT_TITLE" ]; then
            APP_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleDisplayName" "$INFOPLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Print :CFBundleName" "$INFOPLIST" 2>/dev/null)
            if [ -z "$APP_NAME" ]; then
              APP_NAME="${{ github.event.inputs.app_choice }}"
            fi
          else
            APP_NAME="$INPUT_TITLE"
          fi
          echo "final_app_title=$APP_NAME" >> $GITHUB_OUTPUT
          echo "🎯 App Title determined as: $APP_NAME"

          # ── Icon Extraction ──────────────────────────────────────────────────
          # FIX: Apple-crushed (CgBI) PNG decoder written in pure Python stdlib.
          # Handles: CgBI chunk removal, raw-deflate re-inflation, BGRA->RGBA swap,
          # zlib recompression. Falls back to straight copy for normal PNGs.
          mkdir -p extracted_assets
          HAS_ICON="false"

          # Write the decoder script once so it can be called for each candidate icon
          cat > /tmp/fix_cgbi.py << 'PYEOF'
import sys, struct, zlib

def fix_cgbi_png(src, dst):
    with open(src, 'rb') as f:
        data = f.read()

    # Not a PNG at all — copy verbatim
    if data[:8] != b'\x89PNG\r\n\x1a\n':
        with open(dst, 'wb') as f:
            f.write(data)
        return True

    chunks_before_idat = []
    chunks_after_idat  = []
    idat_chunks        = []
    has_cgbi           = False
    past_idat          = False
    i                  = 8

    while i < len(data):
        length     = struct.unpack('>I', data[i:i+4])[0]
        chunk_type = data[i+4:i+8]
        chunk_data = data[i+8:i+8+length]
        i         += 12 + length

        if chunk_type == b'CgBI':
            has_cgbi = True
            continue                          # drop Apple-specific chunk

        if chunk_type == b'IDAT':
            idat_chunks.append(chunk_data)
            past_idat = True
            continue                          # collect all IDAT together

        if past_idat:
            chunks_after_idat.append((chunk_type, chunk_data))
        else:
            chunks_before_idat.append((chunk_type, chunk_data))

    # Regular PNG — copy as-is
    if not has_cgbi:
        with open(dst, 'wb') as f:
            f.write(data)
        return True

    # Re-inflate: Apple uses raw deflate (no zlib wrapper)
    raw = b''.join(idat_chunks)
    try:
        decompressed = zlib.decompress(raw, -15)   # wbits=-15 → raw deflate
    except zlib.error:
        try:
            decompressed = zlib.decompress(raw)    # already standard zlib
        except zlib.error:
            return False                           # give up, unreadable

    # Read IHDR to know dimensions and colour type
    ihdr_data  = next((cd for ct, cd in chunks_before_idat if ct == b'IHDR'), None)
    if ihdr_data is None:
        return False

    width      = struct.unpack('>I', ihdr_data[0:4])[0]
    height     = struct.unpack('>I', ihdr_data[4:8])[0]
    color_type = ihdr_data[9]   # 2=RGB, 6=RGBA

    # Swap BGRA -> RGBA (Apple stores channels in BGRA order)
    if color_type == 6:          # RGBA — 4 bytes per pixel
        bpp      = 4
        row_size = 1 + width * bpp
        rows     = bytearray()
        for row_i in range(height):
            offset      = row_i * row_size
            filter_byte = decompressed[offset]
            row         = bytearray(decompressed[offset + 1 : offset + 1 + width * bpp])
            for px in range(width):
                b, g, r, a = row[px*4], row[px*4+1], row[px*4+2], row[px*4+3]
                row[px*4], row[px*4+1], row[px*4+2], row[px*4+3] = r, g, b, a
            rows += bytes([filter_byte]) + bytes(row)
        decompressed = bytes(rows)
    elif color_type == 2:        # RGB — 3 bytes per pixel, channels already correct
        bpp      = 3
        row_size = 1 + width * bpp
        rows     = bytearray()
        for row_i in range(height):
            offset      = row_i * row_size
            filter_byte = decompressed[offset]
            row         = decompressed[offset + 1 : offset + 1 + width * bpp]
            # BGR -> RGB
            row_ba = bytearray(row)
            for px in range(width):
                b, g, r = row_ba[px*3], row_ba[px*3+1], row_ba[px*3+2]
                row_ba[px*3], row_ba[px*3+1], row_ba[px*3+2] = r, g, b
            rows += bytes([filter_byte]) + bytes(row_ba)
        decompressed = bytes(rows)

    recompressed = zlib.compress(decompressed, 9)

    def make_chunk(ct, cd):
        body = ct + cd
        crc  = zlib.crc32(body) & 0xFFFFFFFF
        return struct.pack('>I', len(cd)) + body + struct.pack('>I', crc)

    out = b'\x89PNG\r\n\x1a\n'
    for chunk_type, chunk_data in chunks_before_idat:
        out += make_chunk(chunk_type, chunk_data)
    out += make_chunk(b'IDAT', recompressed)
    for chunk_type, chunk_data in chunks_after_idat:
        out += make_chunk(chunk_type, chunk_data)

    with open(dst, 'wb') as f:
        f.write(out)
    return True

ok = fix_cgbi_png(sys.argv[1], sys.argv[2])
sys.exit(0 if ok else 1)
PYEOF

          extract_icon_from_path() {
            local ICON_FILE="$1"
            if [ -n "$ICON_FILE" ] && [ -f "$ICON_FILE" ]; then
              FILE_SIZE=$(wc -c < "$ICON_FILE")
              if [ "$FILE_SIZE" -gt 5000 ]; then
                # FIX: decode CgBI (Apple-crushed) PNG before storing
                if python3 /tmp/fix_cgbi.py "$ICON_FILE" extracted_assets/icon.png 2>/dev/null; then
                  HAS_ICON="true"
                  echo "🖼️ Icon extracted & decoded: $ICON_FILE (${FILE_SIZE} bytes)"
                  return 0
                fi
              fi
            fi
            return 1
          }

          # Strategy 1: CFBundleIcons > CFBundlePrimaryIcon plist lookup
          for PLIST_KEY in \
            ":CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles:0" \
            ":CFBundleIcons~ipad:CFBundlePrimaryIcon:CFBundleIconFiles:0" \
            ":CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconName"
          do
            PLIST_ICON=$(/usr/libexec/PlistBuddy -c "Print $PLIST_KEY" "$INFOPLIST" 2>/dev/null || true)
            if [ -n "$PLIST_ICON" ]; then
              ICON_FILE=$(find "$APP_PATH" -name "${PLIST_ICON}@3x.png" 2>/dev/null | head -n 1)
              [ -z "$ICON_FILE" ] && ICON_FILE=$(find "$APP_PATH" -name "${PLIST_ICON}@2x.png" 2>/dev/null | head -n 1)
              [ -z "$ICON_FILE" ] && ICON_FILE=$(find "$APP_PATH" -name "${PLIST_ICON}.png" 2>/dev/null | head -n 1)
              [ -z "$ICON_FILE" ] && ICON_FILE=$(find "$APP_PATH" -name "${PLIST_ICON}*" -name "*.png" 2>/dev/null | sort -t@ -k2 -r | head -n 1)
              if extract_icon_from_path "$ICON_FILE"; then
                HAS_ICON="true"
                break
              fi
            fi
          done

          # Strategy 2: Scan AppIcon*.png — pick largest file (best resolution)
          if [ "$HAS_ICON" = "false" ]; then
            echo "⚠️ Plist icon lookup failed. Scanning for AppIcon PNGs by size..."
            ICON_FILE=$(find "$APP_PATH" -name "AppIcon*.png" 2>/dev/null \
              | xargs -I{} sh -c 'echo "$(wc -c < {}) {}"' \
              | sort -rn | awk '{print $2}' | head -n 1)
            if extract_icon_from_path "$ICON_FILE"; then HAS_ICON="true"; fi
          fi

          # Strategy 3: Broader icon/logo PNG scan — largest file wins
          if [ "$HAS_ICON" = "false" ]; then
            echo "⚠️ AppIcon scan failed. Broadening search to icon/logo named PNGs..."
            ICON_FILE=$(find "$APP_PATH" -name "*.png" 2>/dev/null \
              | grep -Ei "icon|logo" \
              | xargs -I{} sh -c 'echo "$(wc -c < {}) {}"' \
              | sort -rn | awk '{print $2}' | head -n 1)
            if extract_icon_from_path "$ICON_FILE"; then HAS_ICON="true"; fi
          fi

          # Strategy 4: Last resort — largest PNG anywhere in the .app bundle
          if [ "$HAS_ICON" = "false" ]; then
            echo "⚠️ All named searches exhausted. Falling back to largest PNG in bundle..."
            ICON_FILE=$(find "$APP_PATH" -name "*.png" 2>/dev/null \
              | xargs -I{} sh -c 'echo "$(wc -c < {}) {}"' \
              | sort -rn | awk '{print $2}' | head -n 1)
            if extract_icon_from_path "$ICON_FILE"; then HAS_ICON="true"; fi
          fi

          echo "has_icon=$HAS_ICON" >> $GITHUB_OUTPUT

          # ── Codesigning ──────────────────────────────────────────────────────
          rm -rf "$APP_PATH/_CodeSignature"
          cp cert.mobileprovision "$APP_PATH/embedded.mobileprovision"

          security cms -D -i cert.mobileprovision > provision.plist
          /usr/libexec/PlistBuddy -x -c "Print :Entitlements" provision.plist > entitlements.plist

          if [ -d "$APP_PATH/Frameworks" ]; then
            for framework in "$APP_PATH/Frameworks/"*; do
              if [ -d "$framework" ] || [ -f "$framework" ]; then
                codesign --force --sign "$CERT_NAME" --keychain "$KEYCHAIN_PATH" "$framework"
              fi
            done
          fi

          codesign --force --sign "$CERT_NAME" --keychain "$KEYCHAIN_PATH" --entitlements entitlements.plist "$APP_PATH"

          cd app_extracted
          zip -qr ../"$OUTPUT_NAME" Payload
          cd ..

          rm -rf app_extracted provision.plist entitlements.plist
          echo "output_ipa_name=$OUTPUT_NAME" >> $GITHUB_OUTPUT

      # 5. Create GitHub Release with metadata notes
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.TAG_NAME }}
          body: |
            ## 📱 OTA Direct Installation
            🔗 **[Click here to install ${{ steps.resign_ipa.outputs.final_app_title }} directly on iOS](https://huanhoahongso3-collab.github.io/autosignipacert/${{ env.TAG_NAME }}/)**
            
            ---
            
            ### 📋 Build Metadata Info
            * **App Name:** `${{ steps.resign_ipa.outputs.final_app_title }}`
            * **Version:** `${{ steps.resign_ipa.outputs.app_version }}`
            * **Tag:** `${{ env.TAG_NAME }}`
            * **Bundle ID:** `${{ steps.resign_ipa.outputs.bundle_id }}`
            * **📄 Certificate Name:** `${{ steps.keychain_setup.outputs.cert_name }}`
          files: ${{ steps.resign_ipa.outputs.output_ipa_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 6. Generate Dedicated Pages Subfolder Structure
      - name: Generate Subfolder Web Files
        run: |
          DEPLOY_DIR="deploy_dir/${{ env.TAG_NAME }}"
          mkdir -p "$DEPLOY_DIR"
          
          APP_TITLE="${{ steps.resign_ipa.outputs.final_app_title }}"
          BUNDLE_ID="${{ steps.resign_ipa.outputs.bundle_id }}"
          APP_VERSION="${{ steps.resign_ipa.outputs.app_version }}"
          HAS_ICON="${{ steps.resign_ipa.outputs.has_icon }}"
          CERT_NAME="${{ steps.keychain_setup.outputs.cert_name }}"
          
          if [ "$HAS_ICON" = "true" ]; then
            mv extracted_assets/icon.png "$DEPLOY_DIR/icon.png"
            HTML_ICON_ELEMENT="<img src=\"icon.png\" class=\"app-icon\" alt=\"App Icon\" />"
          else
            FIRST_LETTER=$(echo "$APP_TITLE" | cut -c 1 | tr '[:lower:]' '[:upper:]')
            HTML_ICON_ELEMENT="<div class=\"app-icon-fallback\">$FIRST_LETTER</div>"
          fi
          
          IPA_URL="https://github.com/${{ github.repository }}/releases/download/${{ env.TAG_NAME }}/${{ steps.resign_ipa.outputs.output_ipa_name }}"
          
          # Generate manifest.plist
          cat <<EOF > "$DEPLOY_DIR/manifest.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>items</key>
              <array>
                  <dict>
                      <key>assets</key>
                      <array>
                          <dict>
                              <key>kind</key>
                              <string>software-package</string>
                              <key>url</key>
                              <string>$IPA_URL</string>
                          </dict>
                      </array>
                      <key>metadata</key>
                      <dict>
                          <key>bundle-identifier</key>
                          <string>$BUNDLE_ID</string>
                          <key>bundle-version</key>
                          <string>$APP_VERSION</string>
                          <key>kind</key>
                          <string>software</string>
                          <key>title</key>
                          <string>$APP_TITLE</string>
                      </dict>
                  </dict>
              </array>
          </dict>
          </plist>
          EOF

          PLIST_URL="https://huanhoahongso3-collab.github.io/autosignipacert/${{ env.TAG_NAME }}/manifest.plist"
          ITMS_URL="itms-services://?action=download-manifest&url=$PLIST_URL"
          
          cat <<EOF > "$DEPLOY_DIR/index.html"
          <!DOCTYPE html>
          <html>
          <head>
              <title>Install $APP_TITLE</title>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <link rel="preconnect" href="https://fonts.googleapis.com">
              <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
              <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
              <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
              <style>
                  /* Material 3 Dynamic Baseline Pink Palette Mapping Tokens */
                  :root {
                      --md-sys-color-background: #fff7f9;
                      --md-sys-color-on-background: #201a1c;
                      --md-sys-color-surface: #ffd8e6;
                      --md-sys-color-surface-variant: #f2dde4;
                      --md-sys-color-on-surface: #201a1c;
                      --md-sys-color-on-surface-variant: #514347;
                      --md-sys-color-primary: #b32665;
                      --md-sys-color-on-primary: #ffffff;
                      --md-sys-color-outline: #837377;
                      --md-sys-color-outline-variant: #d5c2c6;
                      --md-sys-elevation-3: 0px 4px 8px 3px rgba(179, 38, 101, 0.08), 0px 1px 3px rgba(0, 0, 0, 0.2);
                      --qr-matrix-bg: #fff7f9;
                  }
                  @media (prefers-color-scheme: dark) {
                      :root {
                          --md-sys-color-background: #1e1215;
                          --md-sys-color-on-background: #f0dee2;
                          --md-sys-color-surface: #2d1a20;
                          --md-sys-color-surface-variant: #514347;
                          --md-sys-color-on-surface: #f0dee2;
                          --md-sys-color-on-surface-variant: #d5c2c6;
                          --md-sys-color-primary: #ffb0c9;
                          --md-sys-color-on-primary: #650033;
                          --md-sys-color-outline: #9e8c90;
                          --md-sys-color-outline-variant: #514347;
                          --md-sys-elevation-3: 0px 4px 8px 3px rgba(0, 0, 0, 0.4), 0px 1px 3px rgba(0, 0, 0, 0.5);
                          --qr-matrix-bg: #ffffff;
                      }
                  }
                  body {
                      font-family: 'Space Grotesk', sans-serif;
                      text-align: center;
                      padding: 40px 16px;
                      background-color: var(--md-sys-color-background);
                      color: var(--md-sys-color-on-background);
                      margin: 0;
                      transition: background-color 0.25s cubic-bezier(0.2, 0, 0, 1);
                  }
                  .m3-card {
                      background-color: var(--md-sys-color-surface);
                      padding: 32px 24px;
                      border-radius: 28px;
                      box-shadow: var(--md-sys-elevation-3);
                      display: inline-block;
                      max-width: 400px;
                      width: 100%;
                      box-sizing: border-box;
                      border: 1px solid var(--md-sys-color-outline-variant);
                      transition: background-color 0.25s cubic-bezier(0.2, 0, 0, 1);
                  }
                  .app-icon {
                      width: 96px;
                      height: 96px;
                      border-radius: 24px;
                      object-fit: cover;
                      margin-bottom: 20px;
                      box-shadow: 0px 2px 4px rgba(0,0,0,0.1);
                  }
                  .app-icon-fallback {
                      width: 96px;
                      height: 96px;
                      border-radius: 24px;
                      background: linear-gradient(135deg, var(--md-sys-color-primary), var(--md-sys-color-outline));
                      color: var(--md-sys-color-on-primary);
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      font-size: 40px;
                      font-weight: 700;
                      margin: 0 auto 20px auto;
                  }
                  h1 {
                      font-size: 28px;
                      font-weight: 700;
                      margin: 0 0 8px 0;
                      letter-spacing: -0.5px;
                      color: var(--md-sys-color-on-surface);
                  }
                  .meta-container {
                      background-color: var(--md-sys-color-surface-variant);
                      border-radius: 16px;
                      padding: 12px 16px;
                      margin-bottom: 28px;
                      text-align: left;
                  }
                  .meta-row {
                      font-size: 13px;
                      line-height: 1.6;
                      color: var(--md-sys-color-on-surface-variant);
                      word-break: break-all;
                  }
                  .meta-label {
                      font-weight: 700;
                      color: var(--md-sys-color-on-surface);
                  }
                  .m3-btn {
                      background-color: var(--md-sys-color-primary);
                      color: var(--md-sys-color-on-primary);
                      padding: 14px 28px;
                      border-radius: 100px;
                      text-decoration: none;
                      font-weight: 500;
                      font-size: 16px;
                      display: inline-flex;
                      align-items: center;
                      justify-content: center;
                      gap: 8px;
                      margin-bottom: 28px;
                      transition: box-shadow 0.2s ease, transform 0.1s ease;
                      letter-spacing: 0.1px;
                  }
                  .m3-btn:hover {
                      box-shadow: 0px 1px 3px 1px rgba(179, 38, 101, 0.25), 0px 1px 2px rgba(0,0,0,0.3);
                      opacity: 0.92;
                  }
                  .m3-btn:active { transform: scale(0.98); }
                  .qr-header-text {
                      font-size: 14px;
                      font-weight: 500;
                      margin-bottom: 12px;
                      color: var(--md-sys-color-on-surface);
                  }
                  .qr-container {
                      display: inline-block;
                      background-color: var(--qr-matrix-bg);
                      padding: 16px;
                      border-radius: 16px;
                      border: 1px solid var(--md-sys-color-outline-variant);
                      margin-bottom: 24px;
                  }
                  #qrcode img { margin: 0 auto; }
                  .cert-footer {
                      font-size: 11px;
                      color: var(--md-sys-color-on-surface-variant);
                      font-weight: 500;
                      border-top: 1px solid var(--md-sys-color-outline-variant);
                      padding-top: 16px;
                      word-break: break-word;
                      text-align: left;
                      line-height: 1.5;
                  }
                  .powered-by {
                      font-size: 11px;
                      color: var(--md-sys-color-on-surface-variant);
                      text-align: center;
                      margin-top: 12px;
                      opacity: 0.75;
                      letter-spacing: 0.3px;
                  }
                  .powered-by span {
                      font-weight: 700;
                      color: var(--md-sys-color-primary);
                  }
                  /* Language toggle pill */
                  .lang-toggle {
                      display: inline-flex;
                      gap: 0;
                      border-radius: 100px;
                      border: 1.5px solid var(--md-sys-color-outline-variant);
                      overflow: hidden;
                      margin-bottom: 24px;
                      background: var(--md-sys-color-surface-variant);
                  }
                  .lang-btn {
                      padding: 6px 18px;
                      font-size: 12px;
                      font-weight: 600;
                      font-family: 'Space Grotesk', sans-serif;
                      cursor: pointer;
                      border: none;
                      background: transparent;
                      color: var(--md-sys-color-on-surface-variant);
                      transition: background 0.18s, color 0.18s;
                      letter-spacing: 0.4px;
                  }
                  .lang-btn.active {
                      background: var(--md-sys-color-primary);
                      color: var(--md-sys-color-on-primary);
                  }
              </style>
          </head>
          <body>
              <div class="m3-card">
                  $HTML_ICON_ELEMENT
                  <h1>$APP_TITLE</h1>

                  <!-- Language toggle -->
                  <div class="lang-toggle">
                      <button class="lang-btn" id="btn-en" onclick="setLang('en')">English</button>
                      <button class="lang-btn" id="btn-vi" onclick="setLang('vi')">Tiếng Việt</button>
                  </div>

                  <div class="meta-container">
                      <div class="meta-row"><span class="meta-label" data-i18n="version">Version</span>: $APP_VERSION</div>
                      <div class="meta-row"><span class="meta-label" data-i18n="tag">Tag</span>: ${{ env.TAG_NAME }}</div>
                      <div class="meta-row"><span class="meta-label" data-i18n="bundleId">Bundle ID</span>: $BUNDLE_ID</div>
                  </div>

                  <a href="$ITMS_URL" class="m3-btn">
                      <span data-i18n="installBtn">Tap to Install App</span>
                  </a>

                  <div>
                      <div class="qr-header-text" data-i18n="qrLabel">Or scan this QR code on iOS:</div>
                      <div class="qr-container">
                          <div id="qrcode"></div>
                      </div>
                      <div class="cert-footer">
                          🔒 <span style="font-weight:700;" data-i18n="certLabel">Certificate Name</span>:<br>
                          <span style="font-family: monospace; font-size:11px; display:block; margin-top:4px;">$CERT_NAME</span>
                      </div>
                      <div class="powered-by" data-i18n-html="poweredBy">Powered by <span>dhpOS</span></div>
                  </div>
              </div>

              <script>
                  // ── i18n string table ──────────────────────────────────────────
                  const I18N = {
                      en: {
                          pageTitle:   "Install $APP_TITLE",
                          version:     "Version",
                          tag:         "Tag",
                          bundleId:    "Bundle ID",
                          installBtn:  "Tap to Install App",
                          qrLabel:     "Or scan this QR code on iOS:",
                          certLabel:   "Certificate Name",
                          poweredBy:   'Powered by <span>dhpOS</span>'
                      },
                      vi: {
                          pageTitle:   "Cài đặt $APP_TITLE",
                          version:     "Phiên bản",
                          tag:         "Thẻ",
                          bundleId:    "Bundle ID",
                          installBtn:  "Nhấn để cài ứng dụng",
                          qrLabel:     "Hoặc quét mã QR này trên iOS:",
                          certLabel:   "Tên chứng chỉ",
                          poweredBy:   'Được cung cấp bởi <span>dhpOS</span>'
                      }
                  };

                  function detectLang() {
                      const langs = navigator.languages || [navigator.language || 'en'];
                      for (const l of langs) {
                          if (l.toLowerCase().startsWith('vi')) return 'vi';
                      }
                      return 'en';
                  }

                  function setLang(lang) {
                      const t = I18N[lang] || I18N.en;
                      document.title = t.pageTitle;

                      document.querySelectorAll('[data-i18n]').forEach(el => {
                          const key = el.getAttribute('data-i18n');
                          if (t[key] !== undefined) el.textContent = t[key];
                      });

                      document.querySelectorAll('[data-i18n-html]').forEach(el => {
                          const key = el.getAttribute('data-i18n-html');
                          if (t[key] !== undefined) el.innerHTML = t[key];
                      });

                      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
                      document.getElementById('btn-vi').classList.toggle('active', lang === 'vi');

                      try { sessionStorage.setItem('dhpos_lang', lang); } catch(e) {}
                  }

                  (function() {
                      let lang = 'en';
                      try { lang = sessionStorage.getItem('dhpos_lang') || detectLang(); } catch(e) { lang = detectLang(); }
                      setLang(lang);
                  })();

                  new QRCode(document.getElementById("qrcode"), {
                      text: "$ITMS_URL",
                      width: 160,
                      height: 160,
                      correctLevel: QRCode.CorrectLevel.L
                  });
              </script>
          </body>
          </html>
          EOF

      # 7. Push to gh-pages branch without erasing prior folders
      - name: Deploy to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: deploy_dir
          branch: gh-pages
          clean: false

<!DOCTYPE html>
<html>
<head>
    <title>Install DiuTube</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* Material 3 Dynamic Baseline Pink Palette Mapping Tokens */
        :root {
            --md-sys-color-background: #fff7f9;
            --md-sys-color-on-background: #201a1c;
            --md-sys-color-surface: #ffd8e6;
            --md-sys-color-surface-variant: #f2dde4;
            --md-sys-color-on-surface: #201a1c;
            --md-sys-color-on-surface-variant: #514347;
            --md-sys-color-primary: #b32665;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-outline: #837377;
            --md-sys-color-outline-variant: #d5c2c6;
            --md-sys-elevation-3: 0px 4px 8px 3px rgba(179, 38, 101, 0.08), 0px 1px 3px rgba(0, 0, 0, 0.2);
            --qr-matrix-bg: #fff7f9;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --md-sys-color-background: #1e1215;
                --md-sys-color-on-background: #f0dee2;
                --md-sys-color-surface: #2d1a20;
                --md-sys-color-surface-variant: #514347;
                --md-sys-color-on-surface: #f0dee2;
                --md-sys-color-on-surface-variant: #d5c2c6;
                --md-sys-color-primary: #ffb0c9;
                --md-sys-color-on-primary: #650033;
                --md-sys-color-outline: #9e8c90;
                --md-sys-color-outline-variant: #514347;
                --md-sys-elevation-3: 0px 4px 8px 3px rgba(0, 0, 0, 0.4), 0px 1px 3px rgba(0, 0, 0, 0.5);
                --qr-matrix-bg: #ffffff;
            }
        }
        
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            text-align: center; 
            padding: 40px 16px; 
            background-color: var(--md-sys-color-background); 
            color: var(--md-sys-color-on-background); 
            margin: 0;
            transition: background-color 0.25s cubic-bezier(0.2, 0, 0, 1);
        }
        
        /* Material 3 Card Component specs */
        .m3-card { 
            background-color: var(--md-sys-color-surface); 
            padding: 32px 24px; 
            border-radius: 28px; 
            box-shadow: var(--md-sys-elevation-3);
            display: inline-block; 
            max-width: 400px; 
            width: 100%; 
            box-sizing: border-box; 
            border: 1px solid var(--md-sys-color-outline-variant);
            transition: background-color 0.25s cubic-bezier(0.2, 0, 0, 1);
        }
        
        .app-icon { 
            width: 96px; 
            height: 96px; 
            border-radius: 24px; 
            object-fit: cover; 
            margin-bottom: 20px;
            box-shadow: 0px 2px 4px rgba(0,0,0,0.1);
        }
        
        .app-icon-fallback { 
            width: 96px; 
            height: 96px; 
            border-radius: 24px; 
            background: linear-gradient(135deg, var(--md-sys-color-primary), var(--md-sys-color-outline)); 
            color: var(--md-sys-color-on-primary); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 40px; 
            font-weight: 700; 
            margin: 0 auto 20px auto; 
        }
        
        h1 { 
            font-size: 28px; 
            font-weight: 700;
            margin: 0 0 8px 0; 
            letter-spacing: -0.5px;
            color: var(--md-sys-color-on-surface);
        }
        
        .meta-container {
            background-color: var(--md-sys-color-surface-variant);
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 28px;
            text-align: left;
        }
        
        .meta-row {
            font-size: 13px;
            line-height: 1.6;
            color: var(--md-sys-color-on-surface-variant);
            word-break: break-all;
        }
        .meta-label {
            font-weight: 700;
            color: var(--md-sys-color-on-surface);
        }
        
        /* Material 3 Filled Button specification mapping tokens */
        .m3-btn { 
            background-color: var(--md-sys-color-primary); 
            color: var(--md-sys-color-on-primary); 
            padding: 14px 28px; 
            border-radius: 100px; 
            text-decoration: none; 
            font-weight: 500; 
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 28px; 
            transition: box-shadow 0.2s ease, transform 0.1s ease;
            letter-spacing: 0.1px;
        }
        .m3-btn:hover { 
            box-shadow: 0px 1px 3px 1px rgba(179, 38, 101, 0.25), 0px 1px 2px rgba(0,0,0,0.3);
            opacity: 0.92;
        }
        .m3-btn:active {
            transform: scale(0.98);
        }
        
        .qr-header-text {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 12px;
            color: var(--md-sys-color-on-surface);
        }
        
        .qr-container { 
            display: inline-block; 
            background-color: var(--qr-matrix-bg); 
            padding: 16px; 
            border-radius: 16px; 
            border: 1px solid var(--md-sys-color-outline-variant);
            margin-bottom: 24px;
        }
        #qrcode img { margin: 0 auto; }
        
        .cert-footer { 
            font-size: 11px; 
            color: var(--md-sys-color-on-surface-variant); 
            font-weight: 500; 
            border-top: 1px solid var(--md-sys-color-outline-variant); 
            padding-top: 16px; 
            word-break: break-word; 
            text-align: left;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="m3-card">
        <img src="icon.png" class="app-icon" alt="App Icon" />
        <h1>DiuTube</h1>
        
        <div class="meta-container">
            <div class="meta-row"><span class="meta-label">Version:</span> 21.08.3</div>
            <div class="meta-row"><span class="meta-label">Tag:</span> 20260528-064443</div>
            <div class="meta-row"><span class="meta-label">Bundle ID:</span> com.google.ios.youtube</div>
        </div>
        
        <a href="itms-services://?action=download-manifest&url=https://huanhoahongso3-collab.github.io/autosignipacert/20260528-064443/manifest.plist" class="m3-btn">
            <span>Tap to Install App</span>
        </a>
        
        <div>
            <div class="qr-header-text">Or scan this QR code on iOS:</div>
            <div class="qr-container">
                <div id="qrcode"></div>
            </div>
            <div class="cert-footer">
                🔒 <span style="font-weight:700;">Certificate Name:</span><br>
                <span style="font-family: monospace; font-size:11px; display:block; margin-top:4px;">CN = CN = iPhone Distribution: Aramco Services Company</span>
            </div>
        </div>
    </div>
    <script>
        new QRCode(document.getElementById("qrcode"), {
            text: "itms-services://?action=download-manifest&url=https://huanhoahongso3-collab.github.io/autosignipacert/20260528-064443/manifest.plist",
            width: 160,
            height: 160,
            correctLevel : QRCode.CorrectLevel.L
        });
    </script>
</body>
</html>

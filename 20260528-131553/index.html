<!DOCTYPE html>
<html>
<head>
    <title>Install ibisPaint X</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* Material 3 Dynamic Baseline Pink Palette Mapping Tokens */
        :root {
            --md-sys-color-background: #fff7f9;
            --md-sys-color-on-background: #201a1c;
            --md-sys-color-surface: #ffd8e6;
            --md-sys-color-surface-variant: #f2dde4;
            --md-sys-color-on-surface: #201a1c;
            --md-sys-color-on-surface-variant: #514347;
            --md-sys-color-primary: #b32665;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-outline: #837377;
            --md-sys-color-outline-variant: #d5c2c6;
            --md-sys-elevation-3: 0px 4px 8px 3px rgba(179, 38, 101, 0.08), 0px 1px 3px rgba(0, 0, 0, 0.2);
            --qr-matrix-bg: #fff7f9;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --md-sys-color-background: #1e1215;
                --md-sys-color-on-background: #f0dee2;
                --md-sys-color-surface: #2d1a20;
                --md-sys-color-surface-variant: #514347;
                --md-sys-color-on-surface: #f0dee2;
                --md-sys-color-on-surface-variant: #d5c2c6;
                --md-sys-color-primary: #ffb0c9;
                --md-sys-color-on-primary: #650033;
                --md-sys-color-outline: #9e8c90;
                --md-sys-color-outline-variant: #514347;
                --md-sys-elevation-3: 0px 4px 8px 3px rgba(0, 0, 0, 0.4), 0px 1px 3px rgba(0, 0, 0, 0.5);
                --qr-matrix-bg: #ffffff;
            }
        }
        body {
            font-family: 'Space Grotesk', sans-serif;
            text-align: center;
            padding: 40px 16px;
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            margin: 0;
            transition: background-color 0.25s cubic-bezier(0.2, 0, 0, 1);
        }
        .m3-card {
            background-color: var(--md-sys-color-surface);
            padding: 32px 24px;
            border-radius: 28px;
            box-shadow: var(--md-sys-elevation-3);
            display: inline-block;
            max-width: 400px;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid var(--md-sys-color-outline-variant);
            transition: background-color 0.25s cubic-bezier(0.2, 0, 0, 1);
        }
        .app-icon {
            width: 96px;
            height: 96px;
            border-radius: 24px;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0px 2px 4px rgba(0,0,0,0.1);
        }
        .app-icon-fallback {
            width: 96px;
            height: 96px;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--md-sys-color-primary), var(--md-sys-color-outline));
            color: var(--md-sys-color-on-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 700;
            margin: 0 auto 20px auto;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
            color: var(--md-sys-color-on-surface);
        }
        .meta-container {
            background-color: var(--md-sys-color-surface-variant);
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 28px;
            text-align: left;
        }
        .meta-row {
            font-size: 13px;
            line-height: 1.6;
            color: var(--md-sys-color-on-surface-variant);
            word-break: break-all;
        }
        .meta-label {
            font-weight: 700;
            color: var(--md-sys-color-on-surface);
        }
        .m3-btn {
            background-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            padding: 14px 28px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 28px;
            transition: box-shadow 0.2s ease, transform 0.1s ease;
            letter-spacing: 0.1px;
        }
        .m3-btn:hover {
            box-shadow: 0px 1px 3px 1px rgba(179, 38, 101, 0.25), 0px 1px 2px rgba(0,0,0,0.3);
            opacity: 0.92;
        }
        .m3-btn:active { transform: scale(0.98); }
        .qr-header-text {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 12px;
            color: var(--md-sys-color-on-surface);
        }
        .qr-container {
            display: inline-block;
            background-color: var(--qr-matrix-bg);
            padding: 16px;
            border-radius: 16px;
            border: 1px solid var(--md-sys-color-outline-variant);
            margin-bottom: 24px;
        }
        #qrcode img { margin: 0 auto; }
        .cert-footer {
            font-size: 11px;
            color: var(--md-sys-color-on-surface-variant);
            font-weight: 500;
            border-top: 1px solid var(--md-sys-color-outline-variant);
            padding-top: 16px;
            word-break: break-word;
            text-align: left;
            line-height: 1.5;
        }
        .powered-by {
            font-size: 11px;
            color: var(--md-sys-color-on-surface-variant);
            text-align: center;
            margin-top: 12px;
            opacity: 0.75;
            letter-spacing: 0.3px;
        }
        .powered-by span {
            font-weight: 700;
            color: var(--md-sys-color-primary);
        }
        /* Language toggle pill */
        .lang-toggle {
            display: inline-flex;
            gap: 0;
            border-radius: 100px;
            border: 1.5px solid var(--md-sys-color-outline-variant);
            overflow: hidden;
            margin-bottom: 24px;
            background: var(--md-sys-color-surface-variant);
        }
        .lang-btn {
            padding: 6px 18px;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Space Grotesk', sans-serif;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--md-sys-color-on-surface-variant);
            transition: background 0.18s, color 0.18s;
            letter-spacing: 0.4px;
        }
        .lang-btn.active {
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
        }
    </style>
</head>
<body>
    <div class="m3-card">
        <img src="icon.png" class="app-icon" alt="App Icon" />
        <h1>ibisPaint X</h1>

        <!-- Language toggle -->
        <div class="lang-toggle">
            <button class="lang-btn" id="btn-en" onclick="setLang('en')">English</button>
            <button class="lang-btn" id="btn-vi" onclick="setLang('vi')">Tiếng Việt</button>
        </div>

        <div class="meta-container">
            <div class="meta-row"><span class="meta-label" data-i18n="version">Version</span>: 14.0.0</div>
            <div class="meta-row"><span class="meta-label" data-i18n="tag">Tag</span>: 20260528-131553</div>
            <div class="meta-row"><span class="meta-label" data-i18n="bundleId">Bundle ID</span>: jp.ne.ibis.ibisPaintX</div>
        </div>

        <a href="itms-services://?action=download-manifest&url=https://huanhoahongso3-collab.github.io/autosignipacert/20260528-131553/manifest.plist" class="m3-btn">
            <span data-i18n="installBtn">Tap to Install App</span>
        </a>

        <div>
            <div class="qr-header-text" data-i18n="qrLabel">Or scan this QR code on iOS:</div>
            <div class="qr-container">
                <div id="qrcode"></div>
            </div>
            <div class="cert-footer">
                🔒 <span style="font-weight:700;" data-i18n="certLabel">Certificate Name</span>:<br>
                <span style="font-family: monospace; font-size:11px; display:block; margin-top:4px;">CN = iPhone Distribution: Aramco Services Company</span>
            </div>
            <div class="powered-by" data-i18n-html="poweredBy">Powered by <span>dhpOS</span></div>
        </div>
    </div>

    <script>
        // ── i18n string table ──────────────────────────────────────────
        const I18N = {
            en: {
                pageTitle:   "Install ibisPaint X",
                version:     "Version",
                tag:         "Tag",
                bundleId:    "Bundle ID",
                installBtn:  "Tap to Install App",
                qrLabel:     "Or scan this QR code on iOS:",
                certLabel:   "Certificate Name",
                poweredBy:   'Powered by <span>dhpOS</span>'
            },
            vi: {
                pageTitle:   "Cài đặt ibisPaint X",
                version:     "Phiên bản",
                tag:         "Thẻ",
                bundleId:    "Bundle ID",
                installBtn:  "Nhấn để cài ứng dụng",
                qrLabel:     "Hoặc quét mã QR này trên iOS:",
                certLabel:   "Tên chứng chỉ",
                poweredBy:   'Được cung cấp bởi <span>dhpOS</span>'
            }
        };

        // ── Detect language from device/browser ───────────────────────
        function detectLang() {
            const langs = navigator.languages || [navigator.language || 'en'];
            for (const l of langs) {
                if (l.toLowerCase().startsWith('vi')) return 'vi';
            }
            return 'en';
        }

        // ── Apply language strings to DOM ─────────────────────────────
        function setLang(lang) {
            const t = I18N[lang] || I18N.en;
            document.title = t.pageTitle;

            // data-i18n: plain text nodes
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key] !== undefined) el.textContent = t[key];
            });

            // data-i18n-html: innerHTML nodes (for poweredBy with inner <span>)
            document.querySelectorAll('[data-i18n-html]').forEach(el => {
                const key = el.getAttribute('data-i18n-html');
                if (t[key] !== undefined) el.innerHTML = t[key];
            });

            // Toggle active state on buttons
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-vi').classList.toggle('active', lang === 'vi');

            // Persist choice for current session
            try { sessionStorage.setItem('dhpos_lang', lang); } catch(e) {}
        }

        // ── Init ──────────────────────────────────────────────────────
        (function() {
            let lang = 'en';
            try { lang = sessionStorage.getItem('dhpos_lang') || detectLang(); } catch(e) { lang = detectLang(); }
            setLang(lang);
        })();

        // ── QR Code ───────────────────────────────────────────────────
        new QRCode(document.getElementById("qrcode"), {
            text: "itms-services://?action=download-manifest&url=https://huanhoahongso3-collab.github.io/autosignipacert/20260528-131553/manifest.plist",
            width: 160,
            height: 160,
            correctLevel: QRCode.CorrectLevel.L
        });
    </script>
</body>
</html>

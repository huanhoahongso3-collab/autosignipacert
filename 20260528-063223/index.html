<!DOCTYPE html>
<html>
<head>
    <title>Install DiuTube</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* Core CSS styling handles adaptive theme shifts natively */
        :root {
            --bg-color: #f5f5f7;
            --card-bg: white;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --text-muted: #b2b2b6;
            --qr-wrapper-bg: #f5f5f7;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --card-bg: #1c1c1e;
                --text-primary: #f5f5f7;
                --text-secondary: #98989d;
                --text-muted: #48484a;
                --qr-wrapper-bg: #ffffff; /* QR code background must remain light so camera scanner functions read matrix contrast correctly */
            }
        }
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 50px 20px; background: var(--bg-color); color: var(--text-primary); transition: background 0.3s ease; }
        .card { background: var(--card-bg); padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); display: inline-block; max-width: 400px; width: 100%; box-sizing: border-box; }
        .app-icon { width: 100px; height: 100px; border-radius: 22px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); object-fit: cover; margin-bottom: 15px; }
        .app-icon-fallback { width: 100px; height: 100px; border-radius: 22px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); background: linear-gradient(135deg, #0071e3, #1d1d1f); color: white; display: flex; align-items: center; justify-content: center; font-size: 44px; font-weight: bold; margin: 0 auto 15px auto; font-family: -apple-system, sans-serif; }
        h1 { color: var(--text-primary); margin: 5px 0; font-size: 24px; }
        p { color: var(--text-secondary); margin-top: 5px; margin-bottom: 25px; font-size: 14px; line-height: 1.5; }
        .btn { background: #0071e3; color: white; padding: 12px 24px; border-radius: 980px; text-decoration: none; font-weight: bold; display: inline-block; margin-bottom: 25px; font-size: 16px; }
        .btn:hover { background: #0077ed; }
        .qr-container { margin-top: 15px; display: inline-block; background: var(--qr-wrapper-bg); padding: 15px; border-radius: 12px; }
        #qrcode img { margin: 0 auto; }
        .cert-footer { font-size: 11px; color: var(--text-secondary); margin-top: 12px; font-weight: 500; border-top: 1px solid var(--text-muted); padding-top: 10px; word-break: break-word; }
    </style>
</head>
<body>
    <div class="card">
        <img src="icon.png" class="app-icon" alt="App Icon" />
        <h1>DiuTube</h1>
        <p>Version 21.08.3<br>
           <span style="color: var(--text-muted); font-size: 12px;">Tag: 20260528-063223</span><br>
           <span style="color: var(--text-muted); font-size: 12px;">ID: com.google.ios.youtube</span>
        </p>
        <a href="itms-services://?action=download-manifest&url=https://huanhoahongso3-collab.github.io/autosignipacert/20260528-063223/manifest.plist" class="btn">Tap to Install App</a>
        <div>
            <p style="font-size: 13px; margin-bottom: 10px; color: var(--text-primary);">Or scan this QR code on iOS:</p>
            <div class="qr-container">
                <div id="qrcode"></div>
            </div>
            <div class="cert-footer">
                📄 Certificate Name:<br><span style="font-weight: normal; font-family: monospace;">CN = iPhone Distribution: Aramco Services Company</span>
            </div>
        </div>
    </div>
    <script>
        new QRCode(document.getElementById("qrcode"), {
            text: "itms-services://?action=download-manifest&url=https://huanhoahongso3-collab.github.io/autosignipacert/20260528-063223/manifest.plist",
            width: 160,
            height: 160,
            correctLevel : QRCode.CorrectLevel.L
        });
    </script>
</body>
</html>
